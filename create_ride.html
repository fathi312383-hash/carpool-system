<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer a Ride | Carpool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* HEADER */
.header {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;
    color: white;
}

.header a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
    font-weight: 500;
}

.header a:hover {
    text-decoration: underline;
}

/* CARD */
.container {
    width: 420px;
    padding: 35px;
    border-radius: 18px;
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    color: white;
    animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(25px);}
    to {opacity: 1; transform: translateY(0);}
}

.logo {
    text-align: center;
    font-size: 45px;
    margin-bottom: 10px;
}

h2 {
    text-align: center;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 13px;
    opacity: 0.85;
    margin-bottom: 25px;
}

/* INPUTS */
.input-group {
    margin-bottom: 15px;
}

label {
    font-size: 13px;
}

.input-box {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 10px;
    padding: 8px 10px;
    margin-top: 5px;
}

.input-box span {
    margin-right: 8px;
}

input {
    border: none;
    outline: none;
    width: 100%;
    font-size: 14px;
}

/* ROW */
.row {
    display: flex;
    gap: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 13px;
    margin-top: 20px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* FOOTER */
.extra {
    margin-top: 15px;
    text-align: center;
}

.extra a {
    color: #fff;
    font-size: 13px;
    text-decoration: none;
}

.extra a:hover {
    text-decoration: underline;
}

/* MOBILE */
@media (max-width: 480px) {
    .container {
        width: 90%;
    }

    .row {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="header">
    <div><strong>🚗 Carpool</strong></div>
    <div>
        <a href="dashboard.php">Dashboard</a>
        <a href="index.html">Home</a>
    </div>
</div>

<div class="container">

    <div class="logo">🚘</div>
    <h2>Offer a Ride</h2>
    <div class="subtitle">Share your journey & earn money</div>

    <form action="create_ride.php" method="POST">

        <div class="input-group">
            <label>Source</label>
            <div class="input-box">
                <span>📍</span>
                <input type="text" name="source" placeholder="Pickup location" required>
            </div>
        </div>

        <div class="input-group">
            <label>Destination</label>
            <div class="input-box">
                <span>🏁</span>
                <input type="text" name="destination" placeholder="Drop location" required>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Date</label>
                <div class="input-box">
                    <span>📅</span>
                    <input type="date" name="date" required>
                </div>
            </div>

            <div class="input-group">
                <label>Time</label>
                <div class="input-box">
                    <span>⏰</span>
                    <input type="time" name="time" required>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Seats</label>
                <div class="input-box">
                    <span>💺</span>
                    <input type="number" name="seats" min="1" max="6" required>
                </div>
            </div>

            <div class="input-group">
                <label>Price (₹)</label>
                <div class="input-box">
                    <span>💰</span>
                    <input type="number" name="price" min="0" required>
                </div>
            </div>
        </div>

        <div class="input-group">
            <label>Vehicle</label>
            <div class="input-box">
                <span>🚗</span>
                <input type="text" name="vehicle" placeholder="Car, Bike, etc.">
            </div>
        </div>

        <button type="submit">🚀 Publish Ride</button>
    </form>

    <div class="extra">
        <a href="dashboard.php">← Back to Dashboard</a>
    </div>

</div>

</body>
</html>
