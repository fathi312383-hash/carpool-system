<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Carpool System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .header {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
        }

        .header a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .header a:hover {
            text-decoration: underline;
        }

        .container {
            width: 360px;
            background: #fff;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 45px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 5px;
            color: #333;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 12px;
            font-size: 13px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 6px rgba(79,172,254,0.4);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 38px;
            cursor: pointer;
            font-size: 12px;
            color: #4facfe;
        }

        .options {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 13px;
        }

        .options a {
            color: #4facfe;
            text-decoration: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            background: linear-gradient(135deg, #4facfe, #00c6ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .divider {
            margin: 20px 0;
            font-size: 13px;
            color: #aaa;
        }

        .extra {
            margin-top: 10px;
            font-size: 14px;
        }

        .extra a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 500;
        }

        .extra a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="header">
    <div><strong>🚗 Carpool System</strong></div>
    <div>
        <a href="index.html">Home</a>
        <a href="register.html">Register</a>
    </div>
</div>

<div class="container">
    <div class="logo">🚗</div>
    <h2>Welcome Back</h2>
    <div class="subtitle">Login to continue your journey</div>

    <form action="login.php" method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
            <span class="toggle-password" onclick="togglePassword()">Show</span>
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="divider">or</div>

    <button style="background:#db4437">Login with Google</button>

    <div class="extra">
        <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
}
</script>

</body>
</html>
